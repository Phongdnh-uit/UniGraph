spring:
  config:
    activate:
      on-profile: local
  docker:
    compose:
      file: ./docker/compose.yaml
      lifecycle-management: start-and-stop
  ai:
    vectorstore:
      neo4j:
        initialize-schema: true
        database-name: neo4j
        index-name: course_embeddings
        embedding-dimension: 768
        distance-type: cosine
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: notverysecret

ai:
  embedding:
    base-url: ${EMBEDDING_BASE_URL:http://localhost:11434}
    model: ${EMBEDDING_MODEL:embeddinggemma:latest}
    timeout: 60s
  chat:
    base-url: ${CHAT_BASE_URL:http://localhost:11434}
    model: ${CHAT_MODEL:gemma4:e2b-it-q4_K_M}
    timeout: 120s
