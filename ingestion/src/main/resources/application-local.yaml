spring:
  config:
    activate:
      on-profile: local
  docker:
    compose:
      file: ../docker/compose.yaml
      lifecycle-management: start-and-stop
      readiness:
        tcp:
          read-timeout: 2m
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: notverysecret
  ai:
    vectorstore:
      neo4j:
        initialize-schema: true
        database-name: neo4j
        index-name: custom-index
        embedding-dimension: 1536
        distance-type: cosine
