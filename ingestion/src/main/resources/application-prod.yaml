spring:
  config:
    activate:
      on-profile: prod
  docker:
    compose:
      enabled: false
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:notverysecret}
  ai:
    vectorstore:
      neo4j:
        initialize-schema: true
        database-name: ${NEO4J_DATABASE:neo4j}
        index-name: course_embeddings
        embedding-dimension: 768
        distance-type: cosine

ai:
  embedding:
    base-url: ${EMBEDDING_BASE_URL:http://localhost:11434}
    model: ${EMBEDDING_MODEL:embeddinggemma:latest}
    timeout: 60s
  chat:
    base-url: ${CHAT_BASE_URL:http://localhost:11434}
    model: ${CHAT_MODEL:gemma4:e2b-it-q4_K_M}
    timeout: 120s
